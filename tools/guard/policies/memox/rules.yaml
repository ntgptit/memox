provider_naming:
  match_paths:
    - "/providers/"
    - "/controllers/"
  annotation_tokens:
    - "@riverpod"
    - "@Riverpod(keepAlive: true)"
    - "@Riverpod"
  naming_cases:
    - path_suffix: "repository_providers.dart"
      generated_name_pattern: "^\\w+RepositoryProvider$"
      label: "repository"
    - path_suffix: "usecase_providers.dart"
      generated_name_pattern: "^\\w+UseCaseProvider$"
      label: "use case"
    - path_contains: "/controllers/"
      generated_name_pattern: "^\\w+ControllerProvider$"
      label: "controller"

icon_style:
  excluded_paths:
    - "test/"
  skip_lines_containing:
    - "selectedIcon:"
  allowed_non_outlined:
    - "close"
    - "add"
    - "check"
    - "remove"
    - "arrow_back"
    - "arrow_forward"
    - "chevron_right"
    - "drag_handle"
    - "expand_more"
    - "more_vert"
    - "more_horiz"
  message_code: "icon_style.prefer_outlined"
  message_template: "Icons.{icon_name} → dùng Icons.{icon_name}_outlined nếu có."

import_direction:
  excluded_paths:
    - "test/"
  layers:
    - "data"
    - "domain"
    - "presentation"
  import_path_regex_template: "import\\s+'package:[^']+/features/\\w+/({layers})/"
  forbidden_imports:
    domain:
      - "data"
      - "presentation"
    presentation:
      - "data"
  message_code: "import_direction.forbidden_layer_import"
  message_template: "{current_layer}/ không được import {imported_layer}/. Vi phạm Dependency Inversion."

records_patterns:
  pair_like_patterns:
    - "Tuple2"
    - "Tuple3"
    - "Pair"
  cast_window: 5

riverpod_syntax:
  provider_file_patterns:
    - "core/providers/*.dart"
    - "core/router/app_router.dart"
    - "shared/providers/*.dart"
    - "features/*/presentation/providers/*.dart"
  infrastructure_provider_files:
    - "core/providers/backup_providers.dart"
    - "core/providers/database_providers.dart"
    - "core/providers/datasource_providers.dart"
    - "core/providers/repository_providers.dart"
    - "core/providers/service_providers.dart"
    - "core/providers/storage_providers.dart"
    - "core/router/app_router.dart"
  forbidden_legacy_providers:
    - "Provider"
    - "StateProvider"
    - "FutureProvider"
    - "StreamProvider"
    - "NotifierProvider"
    - "AsyncNotifierProvider"
    - "StreamNotifierProvider"
    - "StateNotifierProvider"
    - "ChangeNotifierProvider"

responsive_layout_test:
  cases:
    - screen: "features/decks/presentation/screens/deck_detail_screen.dart"
      test: "features/decks/presentation/screens/deck_detail_screen_test.dart"
      required_tokens:
        - "setSurfaceSize("
        - "takeException()"
    - screen: "features/folders/presentation/screens/folder_detail_screen.dart"
      test: "features/folders/presentation/screens/folder_detail_screen_test.dart"
      required_tokens:
        - "setSurfaceSize("
        - "takeException()"

refresh_retry:
  retry_path_patterns:
    - "features/*/presentation/screens/*_screen.dart"
    - "features/*/presentation/widgets/*_view.dart"
    - "features/*/presentation/widgets/*_card.dart"
  retry_tokens:
    - "AppAsyncBuilder<"
  retry_callback_tokens:
    - "onRetry:"
  missing_retry_message: "Configured retry-capable async builder must provide onRetry:."
  refresh_path_patterns:
    - "features/folders/presentation/screens/home_screen.dart"
    - "features/folders/presentation/screens/folder_detail_screen.dart"
    - "features/decks/presentation/screens/deck_detail_screen.dart"
    - "features/statistics/presentation/widgets/statistics_content_view.dart"
    - "features/settings/presentation/widgets/settings_content_view.dart"
  missing_refresh_message: "List/content view must use a configured pull-to-refresh wrapper."
  refresh_tokens:
    - "AppRefreshIndicator("
    - "AppRefreshScrollView("
    - "onRefresh:"

safe_area_keyboard:
  path_patterns:
    - "features/*/presentation/screens/*_screen.dart"
    - "features/*/presentation/widgets/*_dialog.dart"
    - "features/*/presentation/widgets/*_view.dart"
    - "shared/widgets/dialogs/*_dialog.dart"
  input_tokens:
    - "AppTextField("
    - "TextField("
  keyboard_safe_tokens:
    - "AppScaffold("
    - "AppDialog("
    - "SliverScaffold("
    - "SingleChildScrollView("
    - "ListView("
    - "CustomScrollView("
  missing_keyboard_safe_message: "File contains input but does not use a configured keyboard-safe wrapper."

test_coverage:
  screen_file_glob: "presentation/screens/*_screen.dart"
  screen_test_glob: "presentation/screens/*_test.dart"
  usecase_file_glob: "domain/usecases/*.dart"
  usecase_test_glob: "domain/usecases/*_test.dart"

srs_fields:
  target_file: "lib/core/database/tables/cards_table.dart"
  missing_target_message_code: "srs_field.missing_cards_table"
  missing_target_message: "Không tìm thấy configured cards table file để validate SRS fields."
  missing_column_message_code: "srs_field.missing_required_column"
  missing_column_message: "Cards table thiếu SRS field `{column}`."
  cards_table:
    required_columns:
      - "status"
      - "easeFactor"
      - "interval"
      - "repetitions"
      - "nextReviewDate"
