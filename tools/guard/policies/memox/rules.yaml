# MemoX domain rules
#
# This file contains MemoX-specific guard rule data: required structures,
# forbidden patterns, design-system contracts, and project conventions.
#
# Loaded automatically when --policy tools/guard/policies/memox is active.
# Guards reference this data via self.project_rules in their check logic.

color_palette:
  target_file: "lib/core/theme/tokens/color_tokens.dart"
  seed_colors:
    - name: "indigo"
      hex: "0xFF5C6BC0"
    - name: "teal"
      hex: "0xFF4DB6AC"
    - name: "rose"
      hex: "0xFFE57373"
    - name: "amber"
      hex: "0xFFFFB74D"
    - name: "slate"
      hex: "0xFF78909C"
    - name: "sage"
      hex: "0xFF81C784"
  semantic_colors:
    success_light: "0xFF4DB6AC"
    success_dark: "0xFF80CBC4"
    warning_light: "0xFFFFB74D"
    warning_dark: "0xFFFFCC80"
    error_light: "0xFFE57373"
    error_dark: "0xFFEF9A9A"
    mastery_light: "0xFF66BB6A"
    mastery_dark: "0xFF81C784"
  surface_colors:
    light_surface: "0xFFFAFAFA"
    dark_surface: "0xFF1C1C1E"
    light_surface_dim: "0xFFF5F5F5"
    dark_surface_dim: "0xFF2C2C2E"
    light_on_surface: "0xFF1D1D1F"
    dark_on_surface: "0xFFE5E5E7"
    light_on_surface_variant: "0xFF6A6A6F"
    dark_on_surface_variant: "0xFFC2C2C8"
  status_colors:
    new: "0xFF9E9E9E"
    learning: "0xFFFFB74D"
    reviewing: "0xFF5C6BC0"
    mastered: "0xFF4DB6AC"
  rating_colors:
    again: "0xFFE57373"
    hard: "0xFFFFB74D"
    good: "0xFF5C6BC0"
    easy: "0xFF4DB6AC"
  self_assessment_colors:
    missed: "0xFFE57373"
    partial: "0xFFFFB74D"
    got_it: "0xFF4DB6AC"

freezed_json_model:
  model_file_patterns:
    - "features/*/domain/entities/*.dart"

drift_tables:
  tables_dir: "lib/core/database/tables"
  folders_table:
    required_columns: ["id", "name", "parentId", "colorValue", "createdAt", "updatedAt", "sortOrder"]
  decks_table:
    required_columns: ["id", "name", "folderId", "colorValue", "tags", "createdAt", "updatedAt"]
  cards_table:
    required_columns: ["id", "deckId", "front", "back", "status", "easeFactor", "interval", "repetitions", "nextReviewDate"]
  study_sessions_table:
    required_columns: ["id", "deckId", "mode", "startedAt", "totalCards", "correctCount", "wrongCount"]
  card_reviews_table:
    required_columns: ["id", "cardId", "sessionId", "mode", "isCorrect", "reviewedAt"]

design_tokens:
  "ColorTokens": "lib/core/theme/tokens/color_tokens.dart"
  "TypographyTokens": "lib/core/theme/tokens/typography_tokens.dart"
  "SpacingTokens": "lib/core/theme/tokens/spacing_tokens.dart"
  "SizeTokens": "lib/core/theme/tokens/size_tokens.dart"
  "RadiusTokens": "lib/core/theme/tokens/radius_tokens.dart"
  "ElevationTokens": "lib/core/theme/tokens/elevation_tokens.dart"
  "DurationTokens": "lib/core/theme/tokens/duration_tokens.dart"
  "EasingTokens": "lib/core/theme/tokens/easing_tokens.dart"
  "OpacityTokens": "lib/core/theme/tokens/opacity_tokens.dart"

