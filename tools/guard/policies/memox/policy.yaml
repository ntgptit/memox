# MemoX policy configuration
#
# This file is loaded by the guard engine when --policy tools/guard/policies/memox
# is active (the default).
#
# To add a policy for a different project:
#   1. Copy this directory to tools/guard/policies/<your-project>/
#   2. Adjust the values below to match your project layout.
#   3. Run: python tools/guard/run.py --policy tools/guard/policies/<your-project>
#
# No Python code changes are required for a new policy.

project_name: "MemoX"
language: "dart"
source_root: "lib"
test_root: "test"

# File extensions accepted project-wide. Individual scopes may override this
# via their own ``extensions`` key inside ``scan_targets``.
language_extensions:
  - ".dart"

paths:
  core_dir: "lib/core"
  shared_dir: "lib/shared"
  features_dir: "lib/features"
  layer_detection:
    root_segment: "features"
    layer_offset: 2
  exclude_patterns:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.config.dart"
    - "**/l10n/generated/**"
    - "**/gen/**"
    - "**/build/**"
    - "**/.dart_tool/**"

# ---------------------------------------------------------------------------
# Scan targets — see docs/config_scopes_paths.md for schema reference
# ---------------------------------------------------------------------------
scan_targets:
  all:
    roots:
      - "lib"
      - "test"
  core:
    roots:
      - "lib/core"
  shared:
    roots:
      - "lib/shared"
  features:
    roots:
      - "lib/features"
  test:
    roots:
      - "test"

thresholds:
  max_widget_lines: 80
  max_file_lines: 300
  max_file_lines_hard: 500
  min_const_ratio: 0.7

# ---------------------------------------------------------------------------
# Guard enablement maps
# Keys must match GUARD_ID values on each guard class.
# Absent keys default to enabled (true).
# ---------------------------------------------------------------------------
global_guards:
  no_hardcoded_color: true
  no_hardcoded_duration: true
  no_hardcoded_radius: true
  no_hardcoded_size: true
  no_hardcoded_font_size: true
  no_hardcoded_string: true
  shared_widget: true
  widget_length: true
  widget_class_length: true
  const_constructor: true
  import_direction: true
  icon_style: true

local_guards:
  button_usage: true
  freezed_json_model: true
  folder_structure: true
  l10n_source: true
  color_palette: true
  design_token_usage: true
  feature_completeness: true
  drift_table: true
  provider_naming: true
  performance_contract: true
  records_patterns: true
  riverpod_syntax: true
  responsive_layout_test: true
  responsive_text_scale: true
  refresh_retry: true
  safe_area_keyboard: true
  screen_scaffold: true
  shared_widget_mapping: true
  srs_field: true
  test_coverage: true
  text_style: true
  touch_target: true
  typography_scale: true

severity_overrides:
  widget_length: "warning"
  widget_class_length: "warning"
  const_constructor: "warning"
  folder_structure: "info"
  icon_style: "warning"
  feature_completeness: "warning"
  records_patterns: "warning"

category_overrides:
  no_else: "style"
  inkwell_highlight_override: "design_system"
  l10n: "i18n"
  async_builder: "design_system"
  legacy_state_notifier: "state_management"
  naming_convention: "naming"
  no_hardcoded_color: "design_system"
  no_hardcoded_duration: "design_system"
  no_hardcoded_radius: "design_system"
  no_hardcoded_size: "design_system"
  no_hardcoded_font_size: "design_system"
  no_hardcoded_string: "i18n"
  shared_widget: "design_system"
  widget_length: "structure"
  widget_class_length: "structure"
  const_constructor: "performance"
  import_direction: "dependency"
  icon_style: "design_system"
  button_usage: "design_system"
  freezed_json_model: "data_contract"
  folder_structure: "structure"
  l10n_source: "i18n"
  color_palette: "design_system"
  design_token_usage: "design_system"
  feature_completeness: "structure"
  drift_table: "database_contract"
  provider_naming: "state_management"
  performance_contract: "performance"
  records_patterns: "style"
  riverpod_syntax: "state_management"
  responsive_layout_test: "testing"
  responsive_text_scale: "design_system"
  refresh_retry: "state_management"
  safe_area_keyboard: "design_system"
  screen_scaffold: "design_system"
  shared_widget_mapping: "design_system"
  srs_field: "database_contract"
  test_coverage: "testing"
  text_style: "design_system"
  touch_target: "design_system"
  app_theme_surface_contract: "design_system"
  shared_action_button_contract: "design_system"
  app_search_bar_contract: "design_system"
  app_list_tile_contract: "design_system"
  shared_overlay_contract: "design_system"
  selection_surface_contract: "design_system"
  study_top_bar_contract: "design_system"
  balanced_top_bar_slot: "design_system"
  feature_bottom_sheet_entrypoint: "design_system"
  typography_scale: "design_system"

exit_policy:
  default:
    description: "Compatibility default: fail on errors only."
    fail_on:
      - "error"
  strict:
    description: "Strict mode: fail on both errors and warnings."
    fail_on:
      - "error"
      - "warning"

rule_profiles:
  default:
    description: "Explicit alias for the current MemoX default behavior."
    exit_policy: "default"
  strict:
    description: "Promote structure drift and fail on warning-tier findings."
    exit_policy: "strict"
    severity_overrides:
      folder_structure: "warning"
  ci:
    description: "CI preset aligned with strict guard enforcement."
    extends: "strict"
  legacy_migration:
    description: "Reduce style-oriented noise during incremental migrations."
    exit_policy: "default"
    global_guards:
      icon_style: false
    local_guards:
      feature_completeness: false

message_catalog:
  no_else.forbidden_else:
    template: "Use early return, guard clause, or switch expression instead of else."
    suggestion: "Return from the exceptional branch first and keep the main path unindented."
    remediation_id: "use_early_return"
    docs_ref: "rules/no_else"
  naming_convention.invalid_file_name:
    template: "File name must follow snake_case."
    suggestion: "Rename `{file_name}` to snake_case and update any references."
    remediation_id: "rename_to_snake_case"
    docs_ref: "rules/file_naming"
  button_usage.raw_material_button:
    template: "Raw Material button detected. Dùng PrimaryButton/SecondaryButton."
    suggestion: "Replace the raw button constructor with PrimaryButton or SecondaryButton."
    remediation_id: "use_shared_button"
    docs_ref: "rules/button_usage"
  l10n_source.app_strings_usage:
    template: "UI string source phải dùng context.l10n.* thay vì AppStrings."
    suggestion: "Read UI strings from context.l10n.* in presentation code."
    remediation_id: "use_context_l10n"
    docs_ref: "rules/l10n_source"
  screen_scaffold.required_shared_scaffold:
    template: "Screen phải dùng AppScaffold hoặc SliverScaffold, không dùng raw Scaffold."
    suggestion: "Wrap the screen with AppScaffold or SliverScaffold instead of raw Scaffold."
    remediation_id: "use_shared_scaffold"
    docs_ref: "rules/screen_scaffold"
  touch_target.missing_min_touch_target:
    template: "Custom tappable widget phải bảo đảm hit target 48dp bằng SizeTokens.touchTarget hoặc constraints tương đương."
    suggestion: "Add a 48dp minimum touch target through shared wrappers or explicit constraints."
    remediation_id: "enforce_touch_target"
    docs_ref: "rules/touch_target"
  icon_style.prefer_outlined:
    template: "Icons.{icon_name} → dùng Icons.{icon_name}_outlined nếu có."
    suggestion: "Prefer the outlined variant to keep visual weight consistent."
    remediation_id: "prefer_outlined_icon"
    docs_ref: "rules/icon_style"
  import_direction.forbidden_layer_import:
    template: "{current_layer}/ không được import {imported_layer}/. Vi phạm Dependency Inversion."
    suggestion: "Move the dependency behind an abstraction owned by the allowed layer."
    remediation_id: "respect_dependency_inversion"
    docs_ref: "rules/import_direction"
  srs_field.missing_cards_table:
    template: "Không tìm thấy configured cards table file để validate SRS fields."
    suggestion: "Restore the cards table file or update the policy target path."
    remediation_id: "restore_cards_table"
    docs_ref: "rules/srs_field"
  srs_field.missing_required_column:
    template: "Cards table thiếu SRS field `{column}`."
    suggestion: "Add the missing SRS column to the cards table definition."
    remediation_id: "add_srs_field"
    docs_ref: "rules/srs_field"

remediation_catalog:
  use_early_return:
    title: "Remove else branch"
    summary: "Prefer a guard clause or early return over an `else` branch."
    manual_steps:
      - "Return from the exceptional path first."
      - "Keep the main execution path at the base indentation level."
  rename_to_snake_case:
    title: "Rename file"
    summary: "Rename the file to snake_case so it matches Dart file naming conventions."
    manual_steps:
      - "Rename the file using snake_case."
      - "Update imports and generated references if needed."
  use_shared_button:
    title: "Use shared button"
    summary: "Replace the raw Material button with PrimaryButton or SecondaryButton."
    manual_steps:
      - "Choose PrimaryButton or SecondaryButton based on the intended emphasis."
      - "Remove the raw ElevatedButton/FilledButton/OutlinedButton/TextButton constructor."
  use_context_l10n:
    title: "Use localized strings"
    summary: "Presentation code should read user-facing strings from context.l10n.*."
    manual_steps:
      - "Import the l10n context extension if needed."
      - "Replace AppStrings usage with the matching context.l10n.* key."
  use_shared_scaffold:
    title: "Use shared scaffold"
    summary: "Feature screens should use AppScaffold or SliverScaffold instead of raw Scaffold."
    manual_steps:
      - "Choose AppScaffold or SliverScaffold for the screen shell."
      - "Move screen content into the shared scaffold wrapper."
  enforce_touch_target:
    title: "Restore 48dp hit target"
    summary: "Interactive custom widgets must maintain a minimum 48dp touch target."
    manual_steps:
      - "Use a shared tappable wrapper when possible."
      - "Add explicit minimum constraints or SizeTokens.touchTarget when needed."
  prefer_outlined_icon:
    title: "Use outlined icon"
    summary: "Swap to the outlined icon variant when the icon family provides one."
    manual_steps:
      - "Replace Icons.{icon_name} with Icons.{icon_name}_outlined when available."
  respect_dependency_inversion:
    title: "Respect import direction"
    summary: "Higher-level layers must not depend directly on forbidden lower-level layers."
    manual_steps:
      - "Move the dependency behind a domain-owned abstraction or provider boundary."
      - "Update the importing file to depend on the allowed layer only."
  restore_cards_table:
    title: "Restore cards table target"
    summary: "The configured cards table file must exist before SRS field checks can run."
    manual_steps:
      - "Restore the cards table file."
      - "Or update the policy target path if the file moved intentionally."
  add_srs_field:
    title: "Add missing SRS column"
    summary: "Cards table must declare every required spaced-repetition field."
    manual_steps:
      - "Add the missing SRS column to cards_table.dart."
      - "Regenerate any derived database artifacts if required."

# ---------------------------------------------------------------------------
# Normalized rules (schema: docs/rule_schema_v2.md)
# These rules are executed by core/rule_executor.py, not by guard class files.
# Migration status: fully migrated — guard .py files for these IDs are removed.
# ---------------------------------------------------------------------------
rules:
  - id: no_else
    type: forbidden_pattern
    name: No else
    description: Use early return, guard clause, or switch expression instead of else.
    severity: error
    scope: global
    enabled: true
    skip_comments: true
    literal_skip:
      - '"else"'
      - "'else'"
    patterns:
      - regex: '\belse\b'
        message_code: "no_else.forbidden_else"
        message: "Use early return, guard clause, or switch expression instead of else."

  - id: inkwell_highlight_override
    type: forbidden_pattern
    name: InkWell highlight override
    description: >
      Do not override highlightColor on InkWell. Theme keeps it transparent to
      avoid rectangular highlight artifacts inside rounded containers.
    severity: warning
    scope: global
    enabled: true
    skip_comments: true
    targets:
      include:
        - "lib/shared/widgets/**"
        - "lib/core/theme/**"
      exclude:
        - "lib/core/theme/app_theme.dart"
        - "test/"
    patterns:
      - regex: 'highlightColor\s*:'
        message: >
          Do not set highlightColor directly. Theme keeps it transparent to
          avoid rectangular highlight artifacts inside rounded containers.

  - id: l10n
    type: forbidden_pattern
    name: L10n usage
    description: User-facing strings should come from localization.
    severity: warning
    scope: global
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "test/"
        - "lib/core/constants/"
    patterns:
      - regex: 'Text\(\s*[''"]'
        message: "Hardcoded string in Text(). Use context.l10n.*"

  - id: async_builder
    type: forbidden_pattern
    name: Async builder enforcement
    description: Prefer AppAsyncBuilder over raw AsyncValue.when calls.
    severity: error
    scope: global
    enabled: true
    skip_comments: false
    targets:
      exclude:
        - "lib/shared/widgets/feedback/app_async_builder.dart"
        - "test/"
    patterns:
      - regex: '\.when\s*\('
        message: "Raw .when() detected. Use AppAsyncBuilder widget."

  - id: legacy_state_notifier
    type: forbidden_pattern
    name: Legacy StateNotifier
    description: Do not use StateNotifier or StateNotifierProvider in Riverpod 3 code.
    severity: error
    scope: local
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "test/"
        - "*.g.dart"
        - "*.freezed.dart"
    patterns:
      - regex: 'StateNotifierProvider'
        message: "Legacy StateNotifier syntax detected. Use @riverpod/@Riverpod."
      - regex: 'extends StateNotifier'
        message: "Legacy StateNotifier syntax detected. Use @riverpod/@Riverpod."
      - regex: 'StateNotifier<'
        message: "Legacy StateNotifier syntax detected. Use @riverpod/@Riverpod."

  - id: naming_convention
    type: file_naming
    name: File naming convention
    description: Dart files should use snake_case names.
    severity: warning
    scope: global
    enabled: true
    naming_pattern: '^[a-z0-9_]+\.dart$'
    naming_message_code: "naming_convention.invalid_file_name"
    naming_message: "File name must follow snake_case."

  - id: no_hardcoded_color
    type: forbidden_pattern
    name: No hardcoded colors
    description: Use context.colors or token classes instead of hardcoded colors.
    severity: error
    scope: global
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "lib/core/theme/tokens/color_tokens.dart"
        - "lib/core/theme/color_schemes/custom_colors.dart"
        - "lib/core/theme/color_schemes/app_color_scheme.dart"
        - "test/"
    patterns:
      - regex: 'Color\(\s*0x[0-9A-Fa-f]+\s*\)'
        message: "Hardcoded color/opacity detected. Dùng context.colors.*, context.customColors.* hoặc OpacityTokens.*"
      - regex: '\bColors\.\w+'
        message: "Hardcoded color/opacity detected. Dùng context.colors.*, context.customColors.* hoặc OpacityTokens.*"
      - regex: 'Color\.fromRGBO\('
        message: "Hardcoded color/opacity detected. Dùng context.colors.*, context.customColors.* hoặc OpacityTokens.*"
      - regex: 'Color\.fromARGB\('
        message: "Hardcoded color/opacity detected. Dùng context.colors.*, context.customColors.* hoặc OpacityTokens.*"
      - regex: '\.withValues\(\s*alpha:\s*(0\.\d+|1\.0*)\s*\)'
        message: "Hardcoded color/opacity detected. Dùng context.colors.*, context.customColors.* hoặc OpacityTokens.*"
      - regex: '\.withOpacity\(\s*(0\.\d+|1\.0*)\s*\)'
        message: "Hardcoded color/opacity detected. Dùng context.colors.*, context.customColors.* hoặc OpacityTokens.*"

  - id: no_hardcoded_duration
    type: forbidden_pattern
    name: No hardcoded durations
    description: Use DurationTokens instead of literal Duration values.
    severity: error
    scope: global
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "lib/core/theme/tokens/duration_tokens.dart"
        - "test/"
    patterns:
      - regex: 'Duration\(\s*(milliseconds|seconds|minutes)\s*:\s*\d+\s*\)'
        message: "Hardcoded duration. Dùng DurationTokens.*"

  - id: no_hardcoded_font_size
    type: forbidden_pattern
    name: No hardcoded font size
    description: Use typography tokens or text themes instead of literal font sizes.
    severity: error
    scope: global
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "lib/core/theme/tokens/typography_tokens.dart"
        - "test/"
    patterns:
      - regex: 'fontSize\s*:\s*\d+(?:\.\d+)?'
        message: "Hardcoded fontSize detected. Dùng context.textTheme hoặc TypographyTokens.*"

  - id: no_hardcoded_radius
    type: forbidden_pattern
    name: No hardcoded radius
    description: Use RadiusTokens instead of BorderRadius.circular literals.
    severity: error
    scope: global
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "lib/core/theme/tokens/radius_tokens.dart"
        - "test/"
    patterns:
      - regex: 'BorderRadius\.(?:all|circular)\(\s*[^)]*\d'
        message: "Radius phải dùng BorderRadius.circular(RadiusTokens.*)"
      - regex: 'BorderRadius\.(?:all|circular)\(\s*[^)]*(?:SpacingTokens|SizeTokens|DurationTokens|OpacityTokens|ColorTokens)\.'
        message: "Radius phải dùng BorderRadius.circular(RadiusTokens.*)"

  - id: no_hardcoded_size
    type: forbidden_pattern
    name: No hardcoded sizes
    description: Use SizeTokens or SpacingTokens instead of numeric widget sizes.
    severity: error
    scope: global
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "lib/core/theme/tokens/size_tokens.dart"
        - "lib/core/theme/tokens/spacing_tokens.dart"
        - "test/"
    patterns:
      - regex: 'SizedBox\([^)]*(height|width)\s*:\s*\d'
        message: "Hardcoded SizedBox spacing detected. Dùng Gap.* và SpacingTokens.*"
      - regex: '\b(size|width|height)\s*:\s*\d+(?:\.\d+)?\b'
        message: "Hardcoded size detected. Dùng SizeTokens.* hoặc SpacingTokens.*"
      - regex: 'EdgeInsets\.(?:all|symmetric|only)\([^)]*\d'
        message: "Hardcoded size detected. Dùng SizeTokens.* hoặc SpacingTokens.*"

  - id: no_hardcoded_string
    type: forbidden_pattern
    name: No hardcoded UI strings
    description: Avoid hardcoded strings in app bars, dialogs, labels, hints, and tooltips.
    severity: error
    scope: global
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "test/"
        - "lib/core/constants/"
        - "l10n/"
    patterns:
      - regex: 'title\s*:\s*Text\(\s*[''"]'
        message: "Hardcoded UI string detected. Dùng context.l10n.*"
      - regex: 'label\s*:\s*(?:Text\()?\s*[''"]'
        message: "Hardcoded UI string detected. Dùng context.l10n.*"
      - regex: 'hintText\s*:\s*[''"]'
        message: "Hardcoded UI string detected. Dùng context.l10n.*"
      - regex: 'tooltip\s*:\s*[''"]'
        message: "Hardcoded UI string detected. Dùng context.l10n.*"
      - regex: 'content\s*:\s*Text\(\s*[''"]'
        message: "Hardcoded UI string detected. Dùng context.l10n.*"

  - id: shared_widget
    type: forbidden_pattern
    name: Shared widget enforcement
    description: Prefer shared widgets over raw framework widgets.
    severity: error
    scope: global
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "lib/shared/widgets/"
        - "test/"
    patterns:
      - regex: '\bCard\('
        message: "Dùng AppCard thay vì raw Card()"
      - regex: '\.when\s*\('
        message: "Dùng AppAsyncBuilder thay vì raw .when(...)"
      - regex: '\bElevatedButton\('
        message: "Dùng PrimaryButton thay vì raw ElevatedButton()"
      - regex: '\bCircularProgressIndicator\('
        message: "Dùng LoadingIndicator thay vì raw CircularProgressIndicator()"
      - regex: '\bTextField\('
        message: "Dùng AppTextField thay vì raw TextField()"
      - regex: '\bListTile\('
        message: "Dùng AppListTile thay vì raw ListTile()"
      - regex: '\bSwitchListTile\('
        message: "Dùng AppSwitchTile thay vì raw SwitchListTile()"
      - regex: '\bSwitch\.adaptive\('
        message: "Dùng AppCardSwitchTile hoặc shared switch wrapper thay vì raw Switch.adaptive()"
      - regex: '\bPopupMenuButton(?:<[^>]+>)?\s*\('
        message: "Dùng AppEditDeleteMenu hoặc shared popup wrapper thay vì raw PopupMenuButton()"
      - regex: '\bSearchBar\('
        message: "Dùng AppSearchBar thay vì raw SearchBar()"
      - regex: '\bRawChip\('
        message: "Dùng shared chip wrapper thay vì raw RawChip()"
      - regex: '\bInkWell\('
        message: "Dùng AppPressable, AppCard, TextLinkButton, hoặc shared wrapper thay vì raw InkWell()"
      - regex: '\bGestureDetector\('
        message: "Dùng AppTapRegion hoặc shared gesture wrapper thay vì raw GestureDetector()"
      - regex: 'ScaffoldMessenger\.of\('
        message: "Dùng Toast thay vì raw ScaffoldMessenger"
      - regex: '\bDismissible\('
        message: "Dùng AppSlidableRow thay vì raw Dismissible()"

  - id: balanced_top_bar_slot
    type: forbidden_pattern
    name: Balanced top-bar slot allowlist
    description: balancedSlotWidth should stay limited to the allowlisted header surfaces that need centered-title geometry.
    severity: error
    scope: local
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "lib/shared/widgets/navigation/study_top_bar.dart"
        - "lib/shared/widgets/navigation/top_bar_back_button.dart"
        - "lib/shared/widgets/navigation/editor_top_bar.dart"
        - "lib/features/decks/presentation/widgets/deck_detail_header.dart"
        - "lib/features/decks/presentation/screens/deck_detail_screen.dart"
        - "lib/features/folders/presentation/screens/folder_detail_screen.dart"
        - "test/"
    patterns:
      - regex: 'TopBar(?:IconButton|BackButton)\.balancedSlotWidth'
        message: "balancedSlotWidth is reserved for allowlisted headers. Prefer compact slot usage elsewhere."

  - id: feature_bottom_sheet_entrypoint
    type: forbidden_pattern
    name: Feature bottom-sheet entrypoint
    description: Feature presentation code should use shared bottom-sheet helpers instead of raw showModalBottomSheet.
    severity: error
    scope: local
    enabled: true
    skip_comments: true
    targets:
      include:
        - "lib/features/*/presentation/**/*.dart"
    patterns:
      - regex: '\bshowModalBottomSheet(?:<[^>]+>)?\s*\('
        message: "Dùng context.showAppBottomSheet(...) hoặc shared sheet helper thay vì raw showModalBottomSheet()."

  - id: button_usage
    type: forbidden_pattern
    name: Button usage
    description: Use PrimaryButton/SecondaryButton instead of raw Material button constructors.
    severity: error
    scope: local
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "lib/shared/widgets/buttons/"
        - "test/"
    patterns:
      - regex: '\bElevatedButton(?:\.\w+)?\('
        message_code: "button_usage.raw_material_button"
        message: "Raw Material button detected. Dùng PrimaryButton/SecondaryButton."
      - regex: '\bFilledButton(?:\.\w+)?\('
        message_code: "button_usage.raw_material_button"
        message: "Raw Material button detected. Dùng PrimaryButton/SecondaryButton."
      - regex: '\bOutlinedButton(?:\.\w+)?\('
        message_code: "button_usage.raw_material_button"
        message: "Raw Material button detected. Dùng PrimaryButton/SecondaryButton."
      - regex: '\bTextButton(?:\.\w+)?\('
        message_code: "button_usage.raw_material_button"
        message: "Raw Material button detected. Dùng PrimaryButton/SecondaryButton."

  - id: l10n_source
    type: forbidden_pattern
    name: L10n source enforcement
    description: UI-facing files must source strings from localization, not AppStrings.
    severity: error
    scope: local
    enabled: true
    skip_comments: true
    targets:
      include:
        - "app.dart"
        - "core/extensions/*.dart"
        - "shared/widgets/**/*.dart"
