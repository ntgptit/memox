        message: "UI string source phải dùng context.l10n.* thay vì AppStrings."

  - id: text_style
    type: forbidden_pattern
    name: Text style usage
    description: Use theme text styles instead of raw TextStyle constructors in UI files.
    severity: error
    scope: local
    enabled: true
    skip_comments: true
    targets:
      exclude:
        - "lib/core/theme/"
        - "test/"
        - "*.g.dart"
        - "*.freezed.dart"
    patterns:
      - regex: 'TextStyle\('
        message: "Raw TextStyle detected. Dùng context.textTheme.* hoặc context.appTextStyles.*"
      - regex: 'fontWeight\s*:\s*FontWeight\.'
        message: "Raw TextStyle detected. Dùng context.textTheme.* hoặc context.appTextStyles.*"
      - regex: 'fontFamily\s*:'
        message: "Raw TextStyle detected. Dùng context.textTheme.* hoặc context.appTextStyles.*"
      - regex: 'fontStyle\s*:'
        message: "Raw TextStyle detected. Dùng context.textTheme.* hoặc context.appTextStyles.*"
      - regex: 'letterSpacing\s*:\s*\d'
        message: "Raw TextStyle detected. Dùng context.textTheme.* hoặc context.appTextStyles.*"
      - regex: 'height\s*:\s*\d'
        message: "Raw TextStyle detected. Dùng context.textTheme.* hoặc context.appTextStyles.*"

