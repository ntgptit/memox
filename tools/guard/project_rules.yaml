color_palette:
  seed_colors:
    - name: "indigo"
      hex: "0xFF5C6BC0"
    - name: "teal"
      hex: "0xFF4DB6AC"
    - name: "rose"
      hex: "0xFFE57373"
    - name: "amber"
      hex: "0xFFFFB74D"
    - name: "slate"
      hex: "0xFF78909C"
    - name: "sage"
      hex: "0xFF81C784"
  semantic_colors:
    success_light: "0xFF4DB6AC"
    success_dark: "0xFF80CBC4"
    warning_light: "0xFFFFB74D"
    warning_dark: "0xFFFFCC80"
    error_light: "0xFFE57373"
    error_dark: "0xFFEF9A9A"
    mastery_light: "0xFF66BB6A"
    mastery_dark: "0xFF81C784"
  surface_colors:
    light_surface: "0xFFFAFAFA"
    dark_surface: "0xFF1C1C1E"
    light_surface_dim: "0xFFF5F5F5"
    dark_surface_dim: "0xFF2C2C2E"
    light_on_surface: "0xFF1D1D1F"
    dark_on_surface: "0xFFE5E5E7"
    light_on_surface_variant: "0xFF6A6A6F"
    dark_on_surface_variant: "0xFFC2C2C8"
  status_colors:
    new: "0xFF9E9E9E"
    learning: "0xFFFFB74D"
    reviewing: "0xFF5C6BC0"
    mastered: "0xFF4DB6AC"
  rating_colors:
    again: "0xFFE57373"
    hard: "0xFFFFB74D"
    good: "0xFF5C6BC0"
    easy: "0xFF4DB6AC"
  self_assessment_colors:
    missed: "0xFFE57373"
    partial: "0xFFFFB74D"
    got_it: "0xFF4DB6AC"

button_usage:
  forbidden_buttons:
    - "ElevatedButton"
    - "FilledButton"
    - "OutlinedButton"
    - "TextButton"
  whitelist_dirs:
    - "lib/shared/widgets/buttons/"
    - "test/"

l10n_source:
  path_patterns:
    - "app.dart"
    - "core/extensions/*.dart"
    - "shared/widgets/**/*.dart"
    - "features/*/presentation/**/*.dart"
  forbidden_tokens:
    - "AppStrings."
    - "core/constants/app_strings.dart"

freezed_json_model:
  model_file_patterns:
    - "features/*/domain/entities/*.dart"

folder_structure:
  required_root_dirs:
    - "lib/core"
    - "lib/shared"
    - "lib/features"
  required_features:
    - "folders"
    - "decks"
    - "cards"
    - "study"
    - "statistics"
    - "settings"
    - "search"
  feature_layers:
    - "data"
    - "domain"
    - "presentation"
  data_subdirs:
    - "tables"
    - "daos"
    - "mappers"
    - "repositories"
  domain_subdirs:
    - "entities"
    - "repositories"
    - "usecases"
  presentation_subdirs:
    - "screens"
    - "widgets"
    - "providers"
  core_required_dirs:
    - "lib/core/theme/tokens"
    - "lib/core/theme/color_schemes"
    - "lib/core/theme/component_themes"
    - "lib/core/theme/text_themes"
    - "lib/core/responsive"
    - "lib/core/router"
    - "lib/core/constants"
    - "lib/core/utils"
    - "lib/core/extensions"
    - "lib/core/mixins"
    - "lib/core/errors"
    - "lib/core/database"
    - "lib/core/database/tables"
    - "lib/core/database/daos"
    - "lib/core/backup"
    - "lib/core/services"
    - "lib/core/providers"
    - "lib/core/types"

drift_tables:
  folders_table:
    required_columns: ["id", "name", "parentId", "colorValue", "createdAt", "updatedAt", "sortOrder"]
  decks_table:
    required_columns: ["id", "name", "folderId", "colorValue", "tags", "createdAt", "updatedAt"]
  cards_table:
    required_columns: ["id", "deckId", "front", "back", "status", "easeFactor", "interval", "repetitions", "nextReviewDate"]
  study_sessions_table:
    required_columns: ["id", "deckId", "mode", "startedAt", "totalCards", "correctCount", "wrongCount"]
  card_reviews_table:
    required_columns: ["id", "cardId", "sessionId", "mode", "isCorrect", "reviewedAt"]

design_tokens:
  "ColorTokens": "lib/core/theme/tokens/color_tokens.dart"
  "TypographyTokens": "lib/core/theme/tokens/typography_tokens.dart"
  "SpacingTokens": "lib/core/theme/tokens/spacing_tokens.dart"
  "SizeTokens": "lib/core/theme/tokens/size_tokens.dart"
  "RadiusTokens": "lib/core/theme/tokens/radius_tokens.dart"
  "ElevationTokens": "lib/core/theme/tokens/elevation_tokens.dart"
  "DurationTokens": "lib/core/theme/tokens/duration_tokens.dart"
  "EasingTokens": "lib/core/theme/tokens/easing_tokens.dart"
  "OpacityTokens": "lib/core/theme/tokens/opacity_tokens.dart"

shared_widget_mapping:
  study_screens:
    path_pattern: "features/study/presentation/screens/*_mode_screen.dart"
    required_widgets:
      - "StudyTopBar"
      - "SessionCompleteView"
    forbidden_widgets:
      - "AppBar("
      - "Scaffold(appBar:"
  list_screens:
    path_pattern: "features/*/presentation/screens/*_screen.dart"
    required_widgets: []
    forbidden_in_list_context:
      - "Dismissible("

provider_naming:
  repository_pattern: "^\\w+RepositoryProvider$"
  usecase_pattern: "^\\w+UseCaseProvider$"
  controller_pattern: "^\\w+ControllerProvider$"

legacy_state_notifier:
  forbidden_patterns:
    - "StateNotifierProvider"
    - "extends StateNotifier"
    - "StateNotifier<"

records_patterns:
  pair_like_patterns:
    - "Tuple2"
    - "Tuple3"
    - "Pair"
  cast_window: 5

riverpod_syntax:
  provider_file_patterns:
    - "core/providers/*.dart"
    - "core/router/*.dart"
    - "shared/providers/*.dart"
    - "features/*/presentation/providers/*.dart"
  infrastructure_provider_files:
    - "core/providers/backup_providers.dart"
    - "core/providers/database_providers.dart"
    - "core/providers/datasource_providers.dart"
    - "core/providers/repository_providers.dart"
    - "core/providers/service_providers.dart"
    - "core/providers/storage_providers.dart"
    - "core/router/app_router.dart"
  forbidden_legacy_providers:
    - "Provider"
    - "StateProvider"
    - "FutureProvider"
    - "StreamProvider"
    - "NotifierProvider"
    - "AsyncNotifierProvider"
    - "StreamNotifierProvider"
    - "StateNotifierProvider"
    - "ChangeNotifierProvider"

responsive_layout_test:
  cases:
    - screen: "features/decks/presentation/screens/deck_detail_screen.dart"
      test: "features/decks/presentation/screens/deck_detail_screen_test.dart"
      required_tokens:
        - "setSurfaceSize("
        - "takeException()"
    - screen: "features/folders/presentation/screens/folder_detail_screen.dart"
      test: "features/folders/presentation/screens/folder_detail_screen_test.dart"
      required_tokens:
        - "setSurfaceSize("
        - "takeException()"

responsive_text_scale:
  cases:
    - file: "lib/app.dart"
      required_tokens:
        - "MediaQuery("
        - "textScaler:"
        - "TextScaler.linear("
        - "ScreenType.of(context).textScaleFactor"
    - file: "test/test_helpers/test_app.dart"
      required_tokens:
        - "MediaQuery("
        - "textScaler:"
        - "TextScaler.linear("
        - "ScreenType.of(context).textScaleFactor"

refresh_retry:
  retry_path_patterns:
    - "features/*/presentation/screens/*_screen.dart"
    - "features/*/presentation/widgets/*_view.dart"
    - "features/*/presentation/widgets/*_card.dart"
  refresh_path_patterns:
    - "features/folders/presentation/screens/home_screen.dart"
    - "features/folders/presentation/screens/folder_detail_screen.dart"
    - "features/decks/presentation/screens/deck_detail_screen.dart"
    - "features/statistics/presentation/widgets/statistics_content_view.dart"
    - "features/settings/presentation/widgets/settings_content_view.dart"
  refresh_tokens:
    - "AppRefreshIndicator("
    - "AppRefreshScrollView("
    - "onRefresh:"

safe_area_keyboard:
  path_patterns:
    - "features/*/presentation/screens/*_screen.dart"
    - "features/*/presentation/widgets/*_dialog.dart"
    - "features/*/presentation/widgets/*_view.dart"
    - "shared/widgets/dialogs/*_dialog.dart"
  input_tokens:
    - "AppTextField("
    - "TextField("
  keyboard_safe_tokens:
    - "AppScaffold("
    - "AppDialog("
    - "SliverScaffold("
    - "SingleChildScrollView("
    - "ListView("
    - "CustomScrollView("

screen_scaffold:
  path_patterns:
    - "features/*/presentation/screens/*_screen.dart"
  allowed_scaffolds:
    - "AppScaffold("
    - "SliverScaffold("

touch_target:
  path_patterns:
    - "shared/widgets/buttons/text_link_button.dart"
    - "shared/widgets/inputs/color_picker.dart"
    - "shared/widgets/navigation/breadcrumb_bar.dart"
    - "features/statistics/presentation/widgets/difficult_cards_section.dart"
    - "features/study/presentation/widgets/fill_submit_button.dart"
  required_tokens:
    - "SizeTokens.touchTarget"
    - "minimumSize:"
    - "minHeight:"
    - "SizeTokens.buttonHeight"
    - "SizeTokens.inputHeight"
    - "SizeTokens.listItemHeight"
    - "SizeTokens.listItemTall"

typography_scale:
  cases:
    - file: "lib/core/theme/tokens/typography_tokens.dart"
      required_tokens:
        - "48 / 32 / 24 / 20 / 16 / 14 / 12"
        - "static const double displayLarge = 32;"
        - "static const double displayMedium = 32;"
        - "static const double statDisplay = 48;"
        - "static const double headlineLarge = 24;"
        - "static const double headlineMedium = 20;"
        - "static const double titleLarge = 24;"
        - "static const double titleMedium = 16;"
        - "static const double titleSmall = 16;"
        - "static const double bodyLarge = 16;"
        - "static const double bodyMedium = 16;"
        - "static const double bodySmall = 14;"
        - "static const double labelLarge = 14;"
        - "static const double labelMedium = 12;"
        - "static const double labelSmall = 12;"
        - "static const double caption = 12;"
    - file: "AGENTS.md"
      required_tokens:
        - "48 / 32 / 24 / 20 / 16 / 14 / 12"
        - "`20` (`headlineMedium`) is the bridge headline size"
    - file: "docs/memox-typography-usage-rules.md"
      required_tokens:
        - "constrained app type scale only"
        - "`20` — bridge headline"
        - "`48 / 32 / 24 / 20 / 16 / 14 / 12`"

test_coverage:
  screen_file_glob: "presentation/screens/*_screen.dart"
  screen_test_glob: "presentation/screens/*_test.dart"
  usecase_file_glob: "domain/usecases/*.dart"
  usecase_test_glob: "domain/usecases/*_test.dart"

text_style:
  forbidden_patterns:
    - "TextStyle\\("
    - "fontWeight\\s*:\\s*FontWeight\\."
    - "fontFamily\\s*:"
    - "fontStyle\\s*:"
    - "letterSpacing\\s*:\\s*\\d"
    - "height\\s*:\\s*\\d"
  whitelist_dirs:
    - "lib/core/theme/"
    - "test/"

srs_fields:
  cards_table:
    required_columns:
      - "status"
      - "easeFactor"
      - "interval"
      - "repetitions"
      - "nextReviewDate"
