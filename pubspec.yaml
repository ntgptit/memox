name: memox
description: A personal flashcard learning app scaffold.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.4.0
  go_router: ^17.1.0
  freezed_annotation: ^2.4.4
  intl: ^0.20.2
  json_annotation: ^4.9.0
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  retrofit: ^4.4.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.3
  riverpod_lint: ^2.1.1
  isar_generator: ^3.1.0+1
  mocktail: ^1.0.4
  custom_lint: ^0.5.11
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
