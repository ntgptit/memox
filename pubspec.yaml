name: memox
description: A personal flashcard learning app scaffold.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  drift: ^2.22.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  google_sign_in: ^6.2.0
  googleapis: ^13.2.0
  http: ^1.2.0
  go_router: ^14.0.0
  freezed_annotation: ^3.1.0
  intl: ^0.20.2
  json_annotation: ^4.11.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  path_provider: ^2.1.0
  path: ^1.9.0
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^19.1.0
  share_plus: ^10.1.0
  file_picker: ^8.1.0
  characters: ^1.4.1
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.3
  drift_dev: ^2.22.0
  mocktail: ^1.0.0
  faker: ^2.2.0
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
